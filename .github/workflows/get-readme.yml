name: Fetch Package READMEs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate README collection
        run: node .github/scripts/fetch-readmes.js

      - name: Commit generated file
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add PACKAGE_READMES.md

          git diff --cached --quiet || git commit -m "Update package documentation"

          git push
